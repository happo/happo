<html>
  <main>
    <h1>Hello world</h1>
    <a href="/goodbye">goodbye</a>

    <div style="width: 200px">
      I am 200px wide.
      <div style="width: 100%" id="stretch-to-parent">
        I stretch to 100% width of my parent, which is 200px wide.
      </div>
    </div>

    <canvas alt="Red square" width="100" height="100"></canvas>

    <button id="interactive-btn" style="padding: 8px 16px; font-size: 14px;">Click me</button>
    <button id="interactive-nested-btn" style="padding: 8px 16px; font-size: 14px;"><span>Click me as well</span></button>

    <style>
      h1 {
        color: red;
        font-weight: bold;
        font-family: sans-serif;
      }

      #interactive-btn:hover, #interactive-nested-btn:hover {
        background-color: lightblue;
      }

      #interactive-btn:focus {
        box-shadow: inset 0 0 0 3px orange;
      }

      #interactive-btn:focus-visible {
        background-color: lightyellow;
      }

      /* :active comes last so coral wins even when :focus/:focus-visible also apply */
      #interactive-btn:active {
        background-color: coral;
      }
    </style>

    <script type="text/javascript">
      const canvas = document.querySelector('canvas');
      canvas.width = 100;
      canvas.height = 100;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'red';
      ctx.fillRect(0, 0, 100, 100);
    </script>
  </main>
</html>
;
